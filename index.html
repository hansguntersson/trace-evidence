<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Trace Evidence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <!-- Landing -->
    <div id="screen-landing" class="screen screen-landing active">
      <p class="landing-version" id="landing-version" aria-label="App version"></p>
      <div class="landing-body">
        <div class="landing-logo-frame" aria-hidden="true">
          <span class="corner tl"></span><span class="corner tr"></span>
          <span class="corner bl"></span><span class="corner br"></span>
          <svg class="landing-logo" viewBox="0 0 120 80" width="120" height="80" aria-hidden="true">
            <path d="M8 12h44v56H8z" fill="#a68966"/>
            <path d="M52 12h60v56H52z" fill="#1a1a1a" opacity="0.08"/>
            <ellipse cx="82" cy="40" rx="22" ry="26" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
            <path d="M68 28c4-8 12-12 20-10 8 2 14 10 14 20 0 14-12 24-26 22" fill="none" stroke="#1a1a1a" stroke-width="1"/>
            <path d="M74 34c2-4 8-6 12-4 6 2 8 8 6 14-2 8-10 12-16 8" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
          </svg>
        </div>
        <h1 class="landing-title">TRACE EVIDENCE</h1>
        <div class="landing-divider" aria-hidden="true"><span></span><i></i><span></span></div>
        <p class="landing-subtitle">A MODERN DETECTIVE GAME</p>
      </div>
      <div class="landing-footer">
        <button type="button" class="btn-landing" id="btn-start-investigating">
          start investigating
        </button>
      </div>
    </div>

    <!-- Cases list -->
    <div id="screen-cases" class="screen screen-cases">
      <header class="cases-header">
        <h1>Cases</h1>
      </header>
      <div class="dossier-scroll cases-scroll" id="cases-list"></div>
      <nav class="case-tabs" role="tablist" aria-label="Case status">
        <button type="button" class="case-tab active" data-case-filter="active">
          Active
          <span class="case-tab-count" id="count-active">0 cases</span>
        </button>
        <button type="button" class="case-tab" data-case-filter="open">
          Open
          <span class="case-tab-count" id="count-open">0 cases</span>
        </button>
        <button type="button" class="case-tab" data-case-filter="closed">
          Closed
          <span class="case-tab-count" id="count-closed">0 cases</span>
        </button>
      </nav>
    </div>

    <!-- Case investigation -->
    <div id="screen-case" class="screen screen-case">
      <header class="app-header">
        <button type="button" class="btn-back" id="btn-back-cases" aria-label="Back to cases">←</button>
        <div class="header-titles">
          <div class="case-heading">
            <span class="case-heading-label">CASE</span>
            <span class="case-ref" id="case-ref">—</span>
            <span class="case-heading-sep" aria-hidden="true">:</span>
            <span class="case-title" id="case-title">—</span>
          </div>
        </div>
        <button type="button" class="btn-text btn-folder" id="btn-resources-case">Resources</button>
      </header>

      <div class="dossier-scroll" id="dossier-scroll">
        <div id="tab-pinned" class="tab-panel active" data-tab="pinned"></div>
        <div id="tab-locations" class="tab-panel" data-tab="locations"></div>
        <div id="tab-evidence" class="tab-panel" data-tab="evidence"></div>
        <div id="tab-people" class="tab-panel" data-tab="people"></div>
      </div>

      <nav class="bottom-nav" aria-label="Dossier">
        <button type="button" class="nav-tab active" data-nav="pinned">
          <img class="pin-icon nav-pin-icon" src="images/pin.png" alt="" width="22" height="22">
          Pinned
          <span class="nav-badge" data-badge="pinned"></span>
        </button>
        <button type="button" class="nav-tab" data-nav="locations">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s6-5.2 6-10a6 6 0 1 0-12 0c0 4.8 6 10 6 10z"/><circle cx="12" cy="11" r="2.5"/></svg>
          Locations
          <span class="nav-badge" data-badge="locations"></span>
        </button>
        <button type="button" class="nav-tab" data-nav="evidence">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg>
          Evidence
          <span class="nav-badge" data-badge="evidence"></span>
        </button>
        <button type="button" class="nav-tab" data-nav="people">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>
          People
          <span class="nav-badge" data-badge="people"></span>
        </button>
      </nav>

      <button type="button" class="fab-combine" id="btn-combine-fab" aria-label="Combine">COMB</button>
    </div>

    <!-- Overlays (unchanged structure) -->
    <div id="overlay-combine" class="overlay" aria-hidden="true">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2>Combine</h2>
          <button type="button" class="btn-text" id="btn-combine-close">Close</button>
        </div>
        <div class="overlay-body">
          <div class="combine-slots">
            <div class="combine-slot" id="slot-a" data-slot="a">
              <div class="slot-label">Slot A</div>
              <span class="slot-content">Tap entity to load</span>
            </div>
            <div class="combine-slot" id="slot-b" data-slot="b">
              <div class="slot-label">Slot B</div>
              <span class="slot-content">Tap entity to load</span>
            </div>
          </div>
          <div class="combine-result" id="combine-result">—</div>
          <div class="combine-actions">
            <button type="button" class="btn-text primary" id="btn-combine-run" disabled>Combine</button>
            <button type="button" class="btn-text" id="btn-combine-clear">Clear</button>
          </div>
        </div>
      </div>
    </div>

    <div id="overlay-resources" class="overlay" aria-hidden="true">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2>Resources</h2>
          <button type="button" class="btn-text" id="btn-resources-close">Close</button>
        </div>
        <div class="overlay-body">
          <p class="resource-hint">Resources are applied from entity cards. This catalogue is reference only.</p>
          <div id="resources-catalogue"></div>
        </div>
      </div>
    </div>

    <div id="overlay-apply-resource" class="overlay" aria-hidden="true">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2>Apply resource</h2>
          <button type="button" class="btn-text" id="btn-apply-resource-close">Close</button>
        </div>
        <div class="overlay-body">
          <p class="resource-hint" id="apply-resource-context"></p>
          <div id="apply-resource-list"></div>
        </div>
      </div>
    </div>

    <div id="overlay-detail" class="overlay detail-overlay" aria-hidden="true">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2 id="detail-title">Entity</h2>
          <button type="button" class="btn-text" id="btn-detail-close">Close</button>
        </div>
        <div class="overlay-body" id="detail-body"></div>
      </div>
    </div>

    <div id="overlay-attribute" class="overlay" aria-hidden="true">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h2>Attribute name</h2>
          <button type="button" class="btn-text" id="btn-attribute-close">Close</button>
        </div>
        <div class="overlay-body">
          <p class="resource-hint" id="attribute-context"></p>
          <div class="person-picker" id="attribute-picker"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app-data.js"></script>
  <script src="js/case1-data.js"></script>
  <script src="js/resources-data.js"></script>
  <script src="js/cases-data.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
